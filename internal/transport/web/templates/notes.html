{{define "content"}}
	<!-- Форма создания. HTMX: POST возвращает фрагмент "note", вставляем в начало
	     #notes (afterbegin), форму сбрасываем после ответа. -->
	<div class="card" style="margin-bottom: 16px;">
		<form class="field" hx-post="/notes" hx-target="#notes" hx-swap="afterbegin" hx-on::after-request="this.reset()">
			<input class="input" name="title" placeholder="Заголовок" maxlength="200" required autofocus>
			<textarea class="textarea" name="body" placeholder="Текст заметки (необязательно)" maxlength="10000" rows="3"></textarea>
			<button class="btn" type="submit">Добавить</button>
		</form>
	</div>

	<div id="notes" class="stack">
		{{range .Notes}}{{template "note" .}}{{else}}<p class="empty" id="empty">Пока нет заметок. Добавьте первую.</p>{{end}}
	</div>
{{end}}
